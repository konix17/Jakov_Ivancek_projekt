# fly.toml app configuration file generated for hotel-mgt-jakov on 2026-06-23T19:50:02+02:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'hotel-mgt-jakov'
primary_region = 'fra'

[build]

[env]
  ConnectionStrings__HotelDb = "Data Source=/app/data/HotelDb.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[mounts]]
  source = "hotel_mgt_data"
  destination = "/app/data"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
